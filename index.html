<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кормушка</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
      background: #f2f2f7;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .card {
      background: rgba(255,255,255,0.8);
      border-radius: 20px;
      padding: 16px;
      margin: 10px 0;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .label {
      font-size: 14px;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .value {
      font-size: 24px;
      font-weight: 600;
    }
    .bar-container {
      width: 30px;
      height: 80px;
      background: #e5e5ea;
      border-radius: 10px;
      overflow: hidden;
      margin-right: 12px;
      display: inline-block;
      vertical-align: middle;
    }
    .bar-fill {
      width: 100%;
      border-radius: 10px 10px 0 0;
      transition: height 0.5s ease;
      background: linear-gradient(to top, #34c759, #30d158);
    }
    #bakFill {
      background: linear-gradient(to top, #007aff, #5ac8fa);
    }
    .bar-wrapper {
      display: flex;
      align-items: center;
      margin-top: 8px;
    }
    .pct {
      font-size: 16px;
      color: #8e8e93;
      margin-left: 8px;
    }
    button {
      display: block;
      width: 100%;
      padding: 16px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 4px 12px rgba(0,122,255,0.3);
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; }
    button.secondary {
      background: transparent;
      color: #007aff;
      border: 1.5px solid #007aff;
      box-shadow: none;
    }
    button.danger {
      background: #ff3b30;
      color: white;
      box-shadow: 0 4px 12px rgba(255,59,48,0.3);
    }
    #status {
      text-align: center;
      margin: 12px 0;
      font-size: 15px;
      color: #555;
    }
    .chip {
      display: inline-block;
      padding: 6px 14px;
      margin: 4px;
      border-radius: 20px;
      background: #e5e5ea;
      color: #1c1c1e;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .chip.selected { background: #007aff; color: white; }
    .schedule-grid {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      gap: 4px;
    }
    .day-column {
      flex: 1;
      text-align: center;
      min-width: 0;
    }
    .day-header {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      color: #1c1c1e;
    }
    .day-times {
      font-size: 13px;
      color: #555;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .day-times li {
      margin: 4px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .time-badge {
      background: #f2f2f7;
      padding: 4px 8px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 2px;
      font-weight: 500;
    }
    .del-btn {
      background: none;
      border: none;
      color: #ff3b30;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      margin: 0;
      box-shadow: none;
      width: auto;
      height: auto;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <span class="label">🥣 Миска</span>
      <span class="value" id="miskaCm">-- см</span>
    </div>
    <div class="bar-wrapper">
      <div class="bar-container">
        <div class="bar-fill" id="miskaBar" style="height:0%"></div>
      </div>
      <span class="pct" id="miskaPct">0%</span>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <span class="label">🛢️ Бак</span>
      <span class="value" id="bakCm">-- см</span>
    </div>
    <div class="bar-wrapper">
      <div class="bar-container">
        <div class="bar-fill" id="bakBar" style="height:0%"></div>
      </div>
      <span class="pct" id="bakPct">0%</span>
    </div>
  </div>

  <div class="card">
    <button id="feedBtn" onclick="sendFeed()">🥣 Покормить сейчас</button>
    <div id="status"></div>
  </div>

  <!-- Карточка расписания -->
  <div class="card">
    <div class="label" style="margin-bottom:8px;">⏰ Расписание кормлений</div>
    <div id="daysSelect" style="margin-bottom:8px;">
      <span class="chip" data-day="1">Пн</span>
      <span class="chip" data-day="2">Вт</span>
      <span class="chip" data-day="3">Ср</span>
      <span class="chip" data-day="4">Чт</span>
      <span class="chip" data-day="5">Пт</span>
      <span class="chip" data-day="6">Сб</span>
      <span class="chip" data-day="0">Вс</span>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <input type="time" id="timeInput" class="input" value="09:00" style="flex:1; padding:10px; border:1px solid #e5e5ea; border-radius:12px; font-size:16px;">
      <button onclick="addSchedule()" style="width:auto; margin-top:0; padding:10px 20px;">Добавить</button>
    </div>

    <!-- Сетка дней -->
    <div id="scheduleGrid" class="schedule-grid">
      <!-- Заполняется динамически -->
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, set, push, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCWn-1-YrkgjnO9jygkHL3QbprG8QS5PAU",
      authDomain: "kormushka-app.firebaseapp.com",
      databaseURL: "https://kormushka-app-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "kormushka-app",
      storageBucket: "kormushka-app.firebasestorage.app",
      messagingSenderId: "414413182022",
      appId: "1:414413182022:web:ab2133d2ccf624c0eee647"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const MISKA_EMPTY = 10.0, MISKA_FULL = 3.0;
    const BAK_EMPTY = 30.0, BAK_FULL = 0.0;

    let selectedDays = new Set();

    // Датчики
    onValue(ref(db, 'sensors'), (snapshot) => {
      const data = snapshot.val() || {};
      updateDisplay(data);
    });

    // Статус
    onValue(ref(db, 'status'), (snap) => {
      document.getElementById('status').textContent = snap.val() || '';
    });

    // Расписание
    onValue(ref(db, 'schedule'), (snapshot) => {
      renderScheduleGrid(snapshot.val());
    });

    function updateDisplay(s) {
      const miskaCm = s.miska;
      if (miskaCm != null && !isNaN(miskaCm)) {
        document.getElementById('miskaCm').textContent = miskaCm + ' см';
        const pct = calcPercent(miskaCm, MISKA_EMPTY, MISKA_FULL);
        document.getElementById('miskaBar').style.height = pct + '%';
        document.getElementById('miskaPct').textContent = Math.round(pct) + '%';
      } else {
        document.getElementById('miskaCm').textContent = '-- см';
        document.getElementById('miskaBar').style.height = '0%';
        document.getElementById('miskaPct').textContent = '?%';
      }

      const bakCm = s.bak;
      if (bakCm != null && !isNaN(bakCm)) {
        document.getElementById('bakCm').textContent = bakCm + ' см';
        const pct = calcPercent(bakCm, BAK_EMPTY, BAK_FULL);
        document.getElementById('bakBar').style.height = pct + '%';
        document.getElementById('bakPct').textContent = Math.round(pct) + '%';
      } else {
        document.getElementById('bakCm').textContent = '-- см';
        document.getElementById('bakBar').style.height = '0%';
        document.getElementById('bakPct').textContent = '?%';
      }
    }

    function calcPercent(dist, empty, full) {
      if (empty === full) return 0;
      let pct = ((empty - dist) / (empty - full)) * 100;
      return Math.max(0, Math.min(100, pct));
    }

    // ---------- Расписание (сетка) ----------
    document.querySelectorAll('#daysSelect .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const day = chip.dataset.day;
        if (selectedDays.has(day)) {
          selectedDays.delete(day);
          chip.classList.remove('selected');
        } else {
          selectedDays.add(day);
          chip.classList.add('selected');
        }
      });
    });

    window.addSchedule = async () => {
      const timeVal = document.getElementById('timeInput').value;
      if (!timeVal) return alert('Введите время');
      if (selectedDays.size === 0) return alert('Выберите дни недели');

      const [h, m] = timeVal.split(':').map(Number);
      const daysArr = Array.from(selectedDays).map(Number);
      
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Сохранение...';
      try {
        await push(ref(db, 'schedule'), {
          days: daysArr,
          hour: h,
          minute: m,
          active: true
        });
        selectedDays.clear();
        document.querySelectorAll('#daysSelect .chip').forEach(c => c.classList.remove('selected'));
        document.getElementById('timeInput').value = '09:00';
      } catch (e) {
        alert('Ошибка: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Добавить';
      }
    };

    window.deleteSchedule = async (key) => {
      if (!confirm('Удалить это расписание?')) return;
      try {
        await remove(ref(db, `schedule/${key}`));
      } catch (e) {
        alert('Ошибка удаления: ' + e.message);
      }
    };

    function renderScheduleGrid(scheduleObj) {
      const grid = document.getElementById('scheduleGrid');
      const dayNames = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
      // Собираем по дням (0-6) массив { key, timeStr }
      const dayMap = Array.from({ length: 7 }, () => []);
      
      if (scheduleObj) {
        Object.entries(scheduleObj).forEach(([key, entry]) => {
          if (!entry.active) return;
          const timeStr = `${String(entry.hour).padStart(2,'0')}:${String(entry.minute).padStart(2,'0')}`;
          entry.days.forEach(day => {
            if (day >= 0 && day <= 6) {
              dayMap[day].push({ key, timeStr });
            }
          });
        });
        // Сортируем времена для каждого дня
        dayMap.forEach(list => list.sort((a, b) => a.timeStr.localeCompare(b.timeStr)));
      }

      grid.innerHTML = dayMap.map((times, index) => {
        const dayName = dayNames[index];
        let timesHtml = times.map(t => 
          `<li><span class="time-badge">${t.timeStr}</span><button class="del-btn" onclick="deleteSchedule('${t.key}')">✕</button></li>`
        ).join('');
        if (!timesHtml) timesHtml = '<li style="color:#ccc;">—</li>';
        return `
          <div class="day-column">
            <div class="day-header">${dayName}</div>
            <ul class="day-times">${timesHtml}</ul>
          </div>
        `;
      }).join('');
    }

    // ---------- Кнопка кормления ----------
    window.sendFeed = async () => {
      const btn = document.getElementById('feedBtn');
      btn.disabled = true;
      btn.textContent = 'Отправка...';
      try {
        await set(ref(db, 'feed_command'), true);
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = '🥣 Покормить сейчас';
        }, 2000);
      } catch (e) {
        alert('Ошибка: ' + e.message);
        btn.disabled = false;
        btn.textContent = '🥣 Покормить сейчас';
      }
    };
  </script>
</body>
</html>
