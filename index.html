<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кормушка</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
      background: #f2f2f7;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .card {
      background: rgba(255,255,255,0.8);
      border-radius: 20px;
      padding: 16px;
      margin: 10px 0;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .label {
      font-size: 14px;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .value {
      font-size: 24px;
      font-weight: 600;
    }
    .bar-container {
      width: 30px;
      height: 80px;
      background: #e5e5ea;
      border-radius: 10px;
      overflow: hidden;
      margin-right: 12px;
      display: inline-block;
      vertical-align: middle;
    }
    .bar-fill {
      width: 100%;
      border-radius: 10px 10px 0 0;
      transition: height 0.5s ease;
      background: linear-gradient(to top, #34c759, #30d158);
    }
    #bakFill {
      background: linear-gradient(to top, #007aff, #5ac8fa);
    }
    .bar-wrapper {
      display: flex;
      align-items: center;
      margin-top: 8px;
    }
    .pct {
      font-size: 16px;
      color: #8e8e93;
      margin-left: 8px;
    }
    button {
      display: block;
      width: 100%;
      padding: 16px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 4px 12px rgba(0,122,255,0.3);
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; }
    button.secondary {
      background: transparent;
      color: #007aff;
      border: 1.5px solid #007aff;
      box-shadow: none;
    }
    button.danger {
      background: #ff3b30;
      color: white;
      box-shadow: 0 4px 12px rgba(255,59,48,0.3);
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 8px;
    }
    #status {
      text-align: center;
      margin: 12px 0;
      font-size: 15px;
      color: #555;
    }
    .chip {
      display: inline-block;
      padding: 6px 14px;
      margin: 4px;
      border-radius: 20px;
      background: #e5e5ea;
      color: #1c1c1e;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .chip.selected { background: #007aff; color: white; }
    .schedule-grid {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-top: 12px;
    }
    .day-column {
      flex: 1 0 48px;
      min-width: 48px;
      text-align: center;
    }
    .day-header {
      font-weight: 600;
      font-size: 12px;
      color: #8e8e93;
      margin-bottom: 6px;
    }
    .time-slot {
      background: #007aff;
      color: white;
      border-radius: 8px;
      padding: 4px 2px;
      margin-bottom: 4px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .delete-time {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      cursor: pointer;
      padding: 2px;
    }
    .no-times {
      color: #c7c7cc;
      font-size: 12px;
    }
    .input {
      padding: 10px;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      font-size: 16px;
      flex: 1;
    }
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }
    #lastSeen {
      font-size: 12px;
      color: #8e8e93;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <span class="label">🥣 Миска</span>
      <span class="value" id="miskaCm">-- см</span>
    </div>
    <div class="bar-wrapper">
      <div class="bar-container">
        <div class="bar-fill" id="miskaBar" style="height:0%"></div>
      </div>
      <span class="pct" id="miskaPct">0%</span>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <span class="label">🛢️ Бак</span>
      <span class="value" id="bakCm">-- см</span>
    </div>
    <div class="bar-wrapper">
      <div class="bar-container">
        <div class="bar-fill" id="bakBar" style="height:0%"></div>
      </div>
      <span class="pct" id="bakPct">0%</span>
    </div>
  </div>

  <div class="card">
    <button id="feedBtn" onclick="sendFeed()">🥣 Покормить сейчас</button>
    <div id="status"></div>
  </div>

  <!-- Индикатор связи -->
  <div class="card">
    <div class="row">
      <span class="label">📶 Связь</span>
      <span id="deviceStatus">
        <span class="status-dot" style="background:#ff3b30"></span> Офлайн
      </span>
    </div>
    <div id="lastSeen">--</div>
  </div>

  <!-- Расписание -->
  <div class="card">
    <div class="label" style="margin-bottom:8px;">⏰ Расписание кормлений</div>
    <div id="daysSelect" style="margin-bottom:8px;">
      <span class="chip" data-day="1">Пн</span>
      <span class="chip" data-day="2">Вт</span>
      <span class="chip" data-day="3">Ср</span>
      <span class="chip" data-day="4">Чт</span>
      <span class="chip" data-day="5">Пт</span>
      <span class="chip" data-day="6">Сб</span>
      <span class="chip" data-day="0">Вс</span>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <input type="time" id="timeInput" class="input" value="09:00">
      <button onclick="addSchedule()" style="width:auto; margin-top:0; padding:10px 20px;">Добавить</button>
    </div>
    <div id="scheduleGrid" class="schedule-grid"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, set, push, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCWn-1-YrkgjnO9jygkHL3QbprG8QS5PAU",
      authDomain: "kormushka-app.firebaseapp.com",
      databaseURL: "https://kormushka-app-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "kormushka-app",
      storageBucket: "kormushka-app.firebasestorage.app",
      messagingSenderId: "414413182022",
      appId: "1:414413182022:web:ab2133d2ccf624c0eee647"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const MISKA_EMPTY = 10.0, MISKA_FULL = 3.0;
    const BAK_EMPTY = 30.0, BAK_FULL = 0.0;
    let selectedDays = new Set();
    const dayNames = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

    // Датчики
    onValue(ref(db, 'sensors'), (snapshot) => {
      const data = snapshot.val() || {};
      updateDisplay(data);
    });

    // Статус
    onValue(ref(db, 'status'), (snap) => {
      document.getElementById('status').textContent = snap.val() || '';
    });

    // Мониторинг связи: last_seen
    onValue(ref(db, 'device/last_seen'), (snapshot) => {
      const lastSeen = snapshot.val();
      const statusEl = document.getElementById('deviceStatus');
      const lastSeenEl = document.getElementById('lastSeen');
      if (lastSeen && !isNaN(lastSeen)) {
        const now = Math.floor(Date.now() / 1000);
        const diff = now - lastSeen;
        if (diff < 15) {
          statusEl.innerHTML = '<span class="status-dot" style="background:#34c759"></span> Онлайн';
          lastSeenEl.textContent = '';
        } else {
          statusEl.innerHTML = '<span class="status-dot" style="background:#ff3b30"></span> Офлайн';
          const d = new Date(lastSeen * 1000);
          const timeStr = d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
          lastSeenEl.textContent = 'Последняя активность: ' + timeStr;
        }
      } else {
        statusEl.innerHTML = '<span class="status-dot" style="background:#ff3b30"></span> Офлайн';
        lastSeenEl.textContent = 'Нет данных';
      }
    });

    // Расписание
    onValue(ref(db, 'schedule'), (snapshot) => {
      renderScheduleGrid(snapshot.val());
    });

    function updateDisplay(s) {
      const miskaCm = s.miska;
      if (miskaCm != null && !isNaN(miskaCm)) {
        document.getElementById('miskaCm').textContent = miskaCm + ' см';
        const pct = calcPercent(miskaCm, MISKA_EMPTY, MISKA_FULL);
        document.getElementById('miskaBar').style.height = pct + '%';
        document.getElementById('miskaPct').textContent = Math.round(pct) + '%';
      } else {
        document.getElementById('miskaCm').textContent = '-- см';
        document.getElementById('miskaBar').style.height = '0%';
        document.getElementById('miskaPct').textContent = '?%';
      }

      const bakCm = s.bak;
      if (bakCm != null && !isNaN(bakCm)) {
        document.getElementById('bakCm').textContent = bakCm + ' см';
        const pct = calcPercent(bakCm, BAK_EMPTY, BAK_FULL);
        document.getElementById('bakBar').style.height = pct + '%';
        document.getElementById('bakPct').textContent = Math.round(pct) + '%';
      } else {
        document.getElementById('bakCm').textContent = '-- см';
        document.getElementById('bakBar').style.height = '0%';
        document.getElementById('bakPct').textContent = '?%';
      }
    }

    function calcPercent(dist, empty, full) {
      if (empty === full) return 0;
      let pct = ((empty - dist) / (empty - full)) * 100;
      return Math.max(0, Math.min(100, pct));
    }

    document.querySelectorAll('#daysSelect .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const day = chip.dataset.day;
        if (selectedDays.has(day)) {
          selectedDays.delete(day);
          chip.classList.remove('selected');
        } else {
          selectedDays.add(day);
          chip.classList.add('selected');
        }
      });
    });

    window.addSchedule = async () => {
      const timeVal = document.getElementById('timeInput').value;
      if (!timeVal) return alert('Введите время');
      if (selectedDays.size === 0) return alert('Выберите дни недели');
      const [h, m] = timeVal.split(':').map(Number);
      const daysArr = Array.from(selectedDays).map(Number);
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Сохранение...';
      try {
        await push(ref(db, 'schedule'), { days: daysArr, hour: h, minute: m, active: true });
        selectedDays.clear();
        document.querySelectorAll('#daysSelect .chip').forEach(c => c.classList.remove('selected'));
        document.getElementById('timeInput').value = '09:00';
      } catch (e) {
        alert('Ошибка: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Добавить';
      }
    };

    window.deleteSchedule = async (key) => {
      if (!confirm('Удалить это расписание?')) return;
      try {
        await remove(ref(db, `schedule/${key}`));
      } catch (e) {
        alert('Ошибка удаления: ' + e.message);
      }
    };

    function renderScheduleGrid(scheduleObj) {
      const grid = document.getElementById('scheduleGrid');
      const days = Array.from({length: 7}, () => []);
      if (scheduleObj) {
        Object.entries(scheduleObj).forEach(([key, entry]) => {
          if (!entry.active) return;
          const timeStr = `${String(entry.hour).padStart(2,'0')}:${String(entry.minute).padStart(2,'0')}`;
          entry.days.forEach(day => days[day].push({ time: timeStr, key }));
        });
      }
      days.forEach(arr => arr.sort((a, b) => a.time.localeCompare(b.time)));
      let html = '';
      for (let d = 0; d < 7; d++) {
        html += `<div class="day-column"><div class="day-header">${dayNames[d]}</div>`;
        if (days[d].length === 0) {
          html += '<div class="no-times">—</div>';
        } else {
          days[d].forEach(item => {
            html += `<div class="time-slot"><span>${item.time}</span><button class="delete-time" onclick="deleteSchedule('${item.key}')" title="Удалить">✕</button></div>`;
          });
        }
        html += '</div>';
      }
      grid.innerHTML = html;
    }

    window.sendFeed = async () => {
      const btn = document.getElementById('feedBtn');
      btn.disabled = true;
      btn.textContent = 'Отправка...';
      try {
        await set(ref(db, 'feed_command'), true);
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = '🥣 Покормить сейчас';
        }, 2000);
      } catch (e) {
        alert('Ошибка: ' + e.message);
        btn.disabled = false;
        btn.textContent = '🥣 Покормить сейчас';
      }
    };
  </script>
</body>
</html>
