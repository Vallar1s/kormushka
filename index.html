<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐱 Кормушка</title>
  <style>
    :root {
      --bg: #f2f2f7; --card: #fff; --text: #1c1c1e; --secondary: #8e8e93;
      --accent: #007aff; --red: #ff3b30; --green: #34c759;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #000; --card: #1c1c1e; --text: #fff; --secondary: #98989d; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 500px; margin: auto; }
    .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .label { font-size: 15px; color: var(--secondary); text-transform: uppercase; }
    .value { font-size: 22px; font-weight: 600; }
    .btn {
      display: block; width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 14px; font-size: 18px; font-weight: 600; margin-top: 12px; cursor: pointer;
    }
    .btn:active { opacity: 0.8; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; margin: 8px 0; }
  </style>
</head>
<body>
<div id="login" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:90vh;">
  <h2>Кормушка</h2>
  <input type="password" id="pass" class="input" placeholder="Пароль" style="max-width:260px">
  <button class="btn" style="max-width:260px" onclick="login()">Войти</button>
</div>

<div id="app" style="display:none;">
  <h2>🐱 Кормушка</h2>
  <div class="card">
    <div class="row"><span class="label">Статус</span><span id="conn">🟡 Проверка...</span></div>
    <div class="row"><span class="label">Миска</span><span class="value" id="miska">-- см</span></div>
    <div class="row"><span class="label">Бак</span><span class="value" id="bak">-- см</span></div>
  </div>
  <button class="btn" onclick="feed()">🥣 Покормить</button>
  <input type="number" id="delayH" placeholder="Часы" class="input" style="width:45%; display:inline-block;">
  <input type="number" id="delayM" placeholder="Минуты" class="input" style="width:45%; display:inline-block; margin-left:4%;">
  <button class="btn" onclick="feedLater()">⏳ Отложить</button>
</div>

<script>
  const ESP_IP = '192.168.1.10'; // ← ЗАМЕНИ на IP своей платы
  const PASSWORD = '1321';

  if (localStorage.getItem('auth') === '1') document.getElementById('login').style.display = 'none', document.getElementById('app').style.display = 'block', start();
  else document.getElementById('app').style.display = 'none';

  function login() {
    if (document.getElementById('pass').value === PASSWORD) {
      localStorage.setItem('auth', '1');
      location.reload();
    } else alert('Неверный пароль');
  }

  function start() {
    setInterval(updateStatus, 3000);
    updateStatus();
  }

  function updateStatus() {
    fetch(`http://${ESP_IP}/status`)
      .then(r => r.json())
      .then(data => {
        document.getElementById('conn').innerHTML = '<span class="status-dot" style="background:var(--green)"></span> Онлайн';
        document.getElementById('miska').textContent = data.miska + ' см';
        document.getElementById('bak').textContent = data.bak + ' см';
      })
      .catch(() => {
        document.getElementById('conn').innerHTML = '<span class="status-dot" style="background:var(--red)"></span> Офлайн';
      });
  }

  function feed() {
    fetch(`http://${ESP_IP}/feed`).then(r => alert('Корм насыпан')).catch(() => alert('Ошибка'));
  }

  function feedLater() {
    let h = document.getElementById('delayH').value || 0;
    let m = document.getElementById('delayM').value || 0;
    if (h==0 && m==0) return alert('Введите время');
    fetch(`http://${ESP_IP}/feed_later?h=${h}&m=${m}`).then(r => alert('Запланировано')).catch(() => alert('Ошибка'));
  }
</script>
</body>
</html>
