<!DOCTYPE html>
<html><body>
<h2>Тест WebSocket (WSS)</h2>
<ul id="results"></ul>
<script>
const tests = [
  { name: "test.mosquitto.org:8080", url: "wss://test.mosquitto.org:8080/mqtt" },
  { name: "broker.hivemq.com:8884", url: "wss://broker.hivemq.com:8884/mqtt" },
  { name: "broker.emqx.io:8084", url: "wss://broker.emqx.io:8084/mqtt" }
];

function runTest(index) {
  if (index >= tests.length) return;
  let li = document.createElement("li");
  li.textContent = tests[index].name + ": проверка...";
  document.getElementById("results").appendChild(li);
  try {
    let ws = new WebSocket(tests[index].url);
    let timeout = setTimeout(() => {
      ws.close();
      li.textContent += " ❌ timeout";
      runTest(index+1);
    }, 5000);
    ws.onopen = () => {
      clearTimeout(timeout);
      li.textContent += " ✅ успех";
      ws.close();
      runTest(index+1);
    };
    ws.onerror = () => {
      clearTimeout(timeout);
      li.textContent += " ❌ ошибка";
      runTest(index+1);
    };
  } catch(e) {
    li.textContent += " ❌ исключение: " + e;
    runTest(index+1);
  }
}
runTest(0);
</script>
</body></html>
