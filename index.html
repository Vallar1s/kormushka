<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Кормушка</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --card-bg: #ffffff;
      --text: #1c1c1e;
      --secondary: #8e8e93;
      --accent: #007aff;
      --red: #ff3b30;
      --green: #34c759;
      --bar-bg: #e5e5ea;
      --tab-bg: #ffffffcc;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card-bg: #1c1c1e;
        --text: #ffffff;
        --secondary: #98989d;
        --bar-bg: #3a3a3c;
        --tab-bg: #1c1c1ecc;
        --shadow: 0 2px 8px rgba(0,0,0,0.4);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 70px;
    }
    .header {
      padding: 16px 20px 8px;
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      color: var(--text);
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      display: none;
    }
    .content.active { display: block; }
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .label {
      font-size: 15px;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .value {
      font-size: 22px;
      font-weight: 600;
    }
    .bar-container {
      width: 40px;
      height: 120px;
      background: var(--bar-bg);
      border-radius: 8px;
      overflow: hidden;
      margin: 8px 0;
    }
    .bar-fill {
      width: 100%;
      background: var(--accent);
      transition: height 0.5s ease;
      border-radius: 8px;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      margin-top: 8px;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .btn.secondary {
      background: var(--card-bg);
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 70px;
      background: var(--tab-bg);
      backdrop-filter: blur(20px);
      display: flex;
      border-top: 0.5px solid var(--bar-bg);
      z-index: 10;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--secondary);
      cursor: pointer;
      transition: color 0.2s;
    }
    .tab.active { color: var(--accent); }
    .tab svg { width: 24px; height: 24px; margin-bottom: 2px; fill: currentColor; }
    .input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--bar-bg);
      border-radius: 10px;
      font-size: 16px;
      margin: 8px 0;
      background: var(--bg);
      color: var(--text);
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }
    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--bar-bg);
      color: var(--text);
      font-size: 14px;
    }
    .chip.selected { background: var(--accent); color: #fff; }
    .alert {
      background: var(--red);
      color: #fff;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
  </style>
</head>
<body>
<div id="loginScreen">
  <h2>Кормушка</h2>
  <input type="password" id="passwordInput" class="input" placeholder="Пароль" style="max-width:260px">
  <button class="btn" style="max-width:260px" onclick="login()">Войти</button>
</div>

<div id="app" style="display:none; flex-direction:column; height:100vh">
  <div class="header">🐱 Кормушка</div>
  
  <!-- Dashboard -->
  <div id="dash" class="content active">
    <div class="card">
      <div class="row"><span class="label">Статус</span><span id="connStatus">⏳</span></div>
      <div id="lostMsg" style="display:none; color:var(--red); font-size:14px;">Соединение потеряно</div>
    </div>
    <div class="card">
      <div class="row"><span class="label">Миска</span><span class="value" id="miskaVal">--</span></div>
      <div class="row"><span class="label">Бак</span><span class="value" id="bakVal">--</span></div>
      <div style="display:flex; align-items:center; gap:16px;">
        <div class="bar-container"><div class="bar-fill" id="bakBar" style="height:0%"></div></div>
        <span id="bakPct">0%</span>
      </div>
    </div>
    <div class="card">
      <div id="lastEvent" style="font-size:14px; color:var(--secondary);">Нет данных</div>
    </div>
    <button class="btn" id="feedBtn" onclick="feedNow()">🥣 Покормить сейчас</button>
    <div style="margin-top:12px;">
      <input type="number" id="delayH" placeholder="Часы" class="input" style="width:45%; display:inline-block;">
      <input type="number" id="delayM" placeholder="Минуты" class="input" style="width:45%; display:inline-block; margin-left:4%;">
      <button class="btn secondary" onclick="feedLater()">Запланировать однократно</button>
    </div>
  </div>

  <!-- Лог -->
  <div id="log" class="content">
    <div class="card">
      <button class="btn secondary" onclick="requestLog()">Обновить лог</button>
      <ul id="logList" style="list-style:none; padding:0; margin-top:12px;"></ul>
    </div>
  </div>

  <!-- Расписание -->
  <div id="schedule" class="content">
    <div class="card">
      <div class="label">Выберите дни</div>
      <div class="checkbox-group" id="daysGroup"></div>
      <input type="time" id="timeInput" class="input" value="09:00">
      <button class="btn" onclick="addSchedule()">Добавить кормление</button>
      <ul id="scheduleList" style="list-style:none; padding:0; margin-top:12px;"></ul>
    </div>
  </div>

  <!-- Настройки -->
  <div id="settings" class="content">
    <div class="card">
      <div class="label">Калибровка порции (мс)</div>
      <input type="number" id="portionTime" class="input" placeholder="500">
      <button class="btn secondary" onclick="calibratePortion()">Сохранить</button>
    </div>
    <div class="card">
      <div class="label">Калибровка миски</div>
      <button class="btn secondary" onclick="calibrate('miska','empty')">Запомнить как пустую</button>
      <button class="btn secondary" onclick="calibrate('miska','full')">Запомнить как полную</button>
    </div>
    <div class="card">
      <div class="label">Калибровка бака</div>
      <button class="btn secondary" onclick="calibrate('bak','empty')">Запомнить как пустой</button>
      <button class="btn secondary" onclick="calibrate('bak','full')">Запомнить как полный</button>
    </div>
    <div class="card">
      <div class="label">Сменить пароль</div>
      <input type="password" id="newPass" class="input" placeholder="Новый пароль">
      <button class="btn secondary" onclick="changePassword()">Сохранить</button>
    </div>
    <button class="btn secondary" style="margin-top:20px;" onclick="logout()">Выйти</button>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab active" data-tab="dash">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      Главная
    </div>
    <div class="tab" data-tab="log">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/><line x1="8" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2"/><line x1="8" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>
      Лог
    </div>
    <div class="tab" data-tab="schedule">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="12,6 12,12 16,14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      Расписание
    </div>
    <div class="tab" data-tab="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>
      Настройки
    </div>
  </div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
  // ---------- КОНФИГУРАЦИЯ ----------
  const MQTT_BROKER = 'wss://test.mosquitto.org:8081/mqtt';
  const TOPIC_FEED = 'kormushka/feed';
  const TOPIC_MISKA = 'kormushka/miska';
  const TOPIC_BAK = 'kormushka/bak';
  const TOPIC_STATUS = 'kormushka/status';
  const TOPIC_LOG_REQ = 'kormushka/log_request';
  const TOPIC_LOG_RES = 'kormushka/log_response';
  const TOPIC_SCHEDULE = 'kormushka/schedule';
  const TOPIC_SETTINGS = 'kormushka/settings';
  const TOPIC_FEED_LATER = 'kormushka/feed_later';
  const TOPIC_CALIBRATE = 'kormushka/calibrate';

  let client;
  let connected = false;
  let auth = false;
  const defaultPassword = '1321';
  let password = localStorage.getItem('kormPassword') || defaultPassword;

  // UI элементы
  const loginScreen = document.getElementById('loginScreen');
  const appDiv = document.getElementById('app');
  const connStatus = document.getElementById('connStatus');
  const lostMsg = document.getElementById('lostMsg');
  const miskaVal = document.getElementById('miskaVal');
  const bakVal = document.getElementById('bakVal');
  const bakBar = document.getElementById('bakBar');
  const bakPct = document.getElementById('bakPct');
  const lastEvent = document.getElementById('lastEvent');
  const feedBtn = document.getElementById('feedBtn');
  const logList = document.getElementById('logList');
  const scheduleList = document.getElementById('scheduleList');
  const daysGroup = document.getElementById('daysGroup');
  const portionTime = document.getElementById('portionTime');

  // ---------- MQTT ----------
  function connectMQTT() {
    client = mqtt.connect(MQTT_BROKER);
    client.on('connect', () => {
      connected = true;
      connStatus.innerHTML = '<span class="status-dot" style="background:var(--green)"></span> Онлайн';
      lostMsg.style.display = 'none';
      client.subscribe([TOPIC_MISKA, TOPIC_BAK, TOPIC_STATUS, TOPIC_LOG_RES]);
      console.log('MQTT connected');
    });
    client.on('close', () => {
      connected = false;
      connStatus.innerHTML = '<span class="status-dot" style="background:var(--red)"></span> Офлайн';
      lostMsg.style.display = 'block';
    });
    client.on('error', (err) => {
      console.error('MQTT error:', err);
      connected = false;
    });
    client.on('message', (topic, message) => {
      const msg = message.toString();
      if (topic === TOPIC_MISKA) miskaVal.textContent = msg + ' см';
      else if (topic === TOPIC_BAK) {
        bakVal.textContent = msg + ' см';
        updateBakBar(msg);
      } else if (topic === TOPIC_STATUS) {
        lastEvent.textContent = 'Последнее: ' + msg;
      } else if (topic === TOPIC_LOG_RES) {
        try {
          const logs = JSON.parse(msg);
          renderLog(logs);
        } catch(e) { logList.innerHTML = '<li>Ошибка формата лога</li>'; }
      }
    });
  }

  function updateBakBar(distCm) {
    let percent = 0;
    let emptyDist = parseFloat(localStorage.getItem('bakEmpty') || 35);
    let fullDist = parseFloat(localStorage.getItem('bakFull') || 5);
    if (fullDist >= emptyDist) { bakPct.textContent = 'калибр'; return; }
    percent = Math.round(((emptyDist - distCm) / (emptyDist - fullDist)) * 100);
    if (percent < 0) percent = 0;
    if (percent > 100) percent = 100;
    bakBar.style.height = percent + '%';
    bakPct.textContent = percent + '%';
  }

  function feedNow() {
    if (!connected) return alert('Нет связи с устройством');
    client.publish(TOPIC_FEED, '1');
    lastEvent.textContent = 'Последнее: кормление...';
  }

  function feedLater() {
    let h = parseInt(document.getElementById('delayH').value) || 0;
    let m = parseInt(document.getElementById('delayM').value) || 0;
    if (h===0 && m===0) return alert('Введите время');
    client.publish(TOPIC_FEED_LATER, JSON.stringify({hours:h, minutes:m}));
    alert('Запланировано');
  }

  function requestLog() {
    client.publish(TOPIC_LOG_REQ, 'get');
  }

  function renderLog(logs) {
    logList.innerHTML = '';
    logs.forEach(entry => {
      let li = document.createElement('li');
      li.textContent = entry;
      li.style.padding = '6px 0';
      logList.appendChild(li);
    });
  }

  // Расписание
  function initDays() {
    const days = ['пн','вт','ср','чт','пт','сб','вс'];
    daysGroup.innerHTML = '';
    days.forEach(day => {
      let chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = day;
      chip.onclick = () => chip.classList.toggle('selected');
      daysGroup.appendChild(chip);
    });
  }

  function addSchedule() {
    let selected = [...daysGroup.querySelectorAll('.selected')].map(c => c.textContent);
    if (selected.length === 0) return alert('Выберите дни');
    let time = document.getElementById('timeInput').value;
    if (!time) return alert('Введите время');
    let entry = {days: selected, time: time};
    client.publish(TOPIC_SCHEDULE, JSON.stringify(entry));
    let li = document.createElement('li');
    li.textContent = selected.join(',') + ' в ' + time;
    scheduleList.appendChild(li);
  }

  // Калибровка
  function calibrate(sensor, type) {
    client.publish(TOPIC_CALIBRATE, JSON.stringify({sensor: sensor, type: type}));
    alert('Запрос отправлен');
  }

  function calibratePortion() {
    let val = portionTime.value;
    if (!val) return;
    client.publish(TOPIC_SETTINGS, JSON.stringify({portion: parseInt(val)}));
  }

  function changePassword() {
    let newPwd = document.getElementById('newPass').value;
    if (!newPwd) return;
    localStorage.setItem('kormPassword', newPwd);
    password = newPwd;
    alert('Пароль изменён');
  }

  function logout() {
    localStorage.removeItem('kormAuth');
    auth = false;
    appDiv.style.display = 'none';
    loginScreen.style.display = 'flex';
  }

  function login() {
    let input = document.getElementById('passwordInput').value;
    if (input === password) {
      auth = true;
      localStorage.setItem('kormAuth', '1');
      loginScreen.style.display = 'none';
      appDiv.style.display = 'flex';
      if (!client) connectMQTT();
    } else {
      alert('Неверный пароль');
    }
  }

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      let target = tab.dataset.tab;
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      document.getElementById(target).classList.add('active');
    });
  });

  // Проверить авторизацию при загрузке
  if (localStorage.getItem('kormAuth') === '1') {
    auth = true;
    loginScreen.style.display = 'none';
    appDiv.style.display = 'flex';
    connectMQTT();
  }

  initDays();

  // Уведомления
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
  function notify(title, body) {
    if (Notification.permission === 'granted') {
      new Notification(title, { body });
    }
  }
</script>
</body>
</html>
